<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Byer — Location immobilière & véhicules</title>
  <meta name="description" content="Trouvez votre logement ou véhicule au Cameroun. Appartements, villas, studios, SUV — à la nuitée ou au mois."/>
  <meta name="theme-color" content="#FF5A5F"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'><rect width='30' height='30' rx='9' fill='%23FF5A5F'/><path d='M9 8h6.5a3.5 3.5 0 010 7H9m0 0h7a3.5 3.5 0 010 7H9V8z' stroke='white' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png"/>

  <!-- Global CSS -->
  <link rel="stylesheet" href="css/global.css"/>

  <style>
    html, body { height: 100%; background: #F7F7F7; }
    #root { height: 100%; display: flex; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="byer-loading">
    <div class="loading-logo">
      <svg width="90" height="90" viewBox="0 0 120 120" fill="none">
        <rect width="120" height="120" rx="34" fill="#FF5A5F"/>
        <path d="M36 34h27a14 14 0 010 28H36m0 0h29a14 14 0 010 28H36V34z"
              stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p style="font-family:'DM Sans',sans-serif;font-size:13px;color:#9B9B9B;font-weight:500;">
      Chargement en cours...
    </p>
    <div class="loading-bar-track">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- React root -->
  <div id="root"></div>

  <!-- React 18 — LOCAL (pas de CDN, fonctionne hors-ligne) -->
  <!-- Babel standalone retiré : le bundle est pré-transpilé par build.js (Babel CLI) -->
  <script src="lib/react.min.js"></script>
  <script src="lib/react-dom.min.js"></script>

  <!-- Supabase JS Client — LOCAL (expose window.supabase) -->
  <script src="lib/supabase.min.js"></script>

  <!-- App Bundle (pré-transpilé : pur ES5+, plus besoin de Babel à l'exécution) -->
  <script src="bundle.js?v=29"></script>

  <!-- Hide loading screen after React mounts -->
  <script>
    // React signale via window.dispatchEvent(new Event('byer-ready')) dans main.js
    // une fois le useEffect du Root component fire. Plus propre qu'un poll.
    function hideLoader() {
      var loader = document.getElementById('byer-loading');
      if (!loader) return;
      loader.classList.add('fade-out');
      setTimeout(function() { loader.remove(); }, 400);
    }
    window.addEventListener('byer-ready', hideLoader, { once: true });

    // Filet de securite : si pour une raison quelconque l'event ne fire pas
    // (erreur JS, blocage CDN React/Babel...), on fade le loader apres 8s
    // pour eviter qu'il reste bloque a l'ecran.
    setTimeout(function() {
      var loader = document.getElementById('byer-loading');
      if (loader && !loader.classList.contains('fade-out')) {
        console.warn('[byer] event byer-ready jamais recu apres 8s — fade par securite');
        hideLoader();
      }
    }, 30000);

    // Service Worker — avec auto-update et auto-reload
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(function(reg) {
        // Vérifie immédiatement s'il y a une nouvelle version
        reg.update().catch(function(){});
        // Quand une nouvelle SW prend la main → reload automatique
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function() {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
        // Détecte les SW en attente et leur dit de prendre la main
        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        reg.addEventListener('updatefound', function() {
          var nw = reg.installing;
          if (!nw) return;
          nw.addEventListener('statechange', function() {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) {
              nw.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
      }).catch(function() {});
    }
  </script>
</body>
</html>
